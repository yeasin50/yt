{{- define "main" -}}

<header class="page-header">
    <h1>{{ .Title }}</h1>
</header>

<div id="searchbox">
    <input id="searchInput" autofocus placeholder="{{ .Params.placeholder | default (printf "Search %s..." .Site.Title) }}"
        aria-label="search" type="search" autocomplete="off">
    
    {{- if .Site.Taxonomies.tags -}}
    <div id="search-tags-explorer" style="margin-top: 24px; padding-bottom: 20px;">
        <p style="font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; opacity: 0.6; text-align: center;">Explore Topics</p>
        
        <div class="post-tags" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 12px;">
            {{- range $name, $taxonomy := .Site.Taxonomies.tags -}}
            {{- $tag_url := printf "/tags/%s/" ($name | urlize) -}}
            <a href="{{ $tag_url | absURL }}" class="post-tag tag-{{ $name | urlize }}" style="text-decoration: none; display: inline-flex; align-items: center; gap: 6px;">
                {{ $name }}
                <span style="font-size: 10px; opacity: 0.7; background: rgba(0,0,0,0.2); padding: 0 4px; border-radius: 3px;">
                    {{ len $taxonomy }}
                </span>
            </a>
            {{- end -}}
        </div>
    </div>
    {{- end -}}
    <ul id="searchResults" aria-label="search results"></ul>
</div>

<script>
    // Seamlessly hide tags when user starts typing
    const searchInput = document.getElementById('searchInput');
    const tagsExplorer = document.getElementById('search-tags-explorer');
    
    if (searchInput && tagsExplorer) {
        searchInput.addEventListener('input', function() {
            if (this.value.length > 0) {
                tagsExplorer.style.display = 'none';
            } else {
                tagsExplorer.style.display = 'block';
            }
        });
    }
</script>

{{- end -}}
